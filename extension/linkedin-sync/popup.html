<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BFE LinkedIn Sync</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        width: 360px;
        background: #fdfaf6;
        color: #1a1a1a;
      }

      .wrap {
        padding: 16px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 18px;
      }

      p {
        margin: 0;
        color: #5f5a54;
        font-size: 13px;
        line-height: 1.45;
      }

      label {
        display: block;
        margin-top: 14px;
        font-size: 12px;
        font-weight: 600;
        color: #433f3b;
      }

      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #ddd3c5;
        border-radius: 12px;
        padding: 10px 12px;
        background: #fff;
        color: #1a1a1a;
        font: inherit;
        margin-top: 6px;
      }

      textarea {
        min-height: 90px;
        resize: vertical;
      }

      .row {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        flex: 1;
        border: 0;
        border-radius: 999px;
        padding: 11px 14px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
      }

      .primary {
        background: #ef562a;
        color: #fff;
      }

      .secondary {
        background: #1a1a1a;
        color: #fff;
      }

      .muted {
        margin-top: 12px;
        border-radius: 14px;
        background: #fff3e8;
        padding: 12px;
        font-size: 12px;
        line-height: 1.45;
        color: #7a4d3a;
      }

      .status {
        margin-top: 14px;
        border-radius: 14px;
        background: #fff;
        border: 1px solid #ede3d6;
        padding: 12px;
        font-size: 12px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>BFE LinkedIn Sync</h1>
      <p>Scan visible LinkedIn profiles on the current page, then sync them into Referral Assist.</p>

      <label for="appUrl">App URL</label>
      <input id="appUrl" type="url" placeholder="https://www.theblackfemaleengineer.com" />

      <label for="token">Extension token</label>
      <textarea id="token" placeholder="Paste the token generated from /profile/referrals"></textarea>

      <div class="row">
        <button id="scanButton" class="secondary">Scan page</button>
        <button id="syncButton" class="primary">Sync captured</button>
      </div>

      <div class="muted">
        Tip: open a LinkedIn connections, search, or people results page first. The extension only captures visible cards on the current page.
      </div>

      <div id="status" class="status">No scan run yet.</div>
    </div>

    <script src="popup.js"></script>
  </body>
  </html>
